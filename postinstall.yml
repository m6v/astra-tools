---

- name: My first playbook
  hosts: all
  gather_facts: false
  become: true
  vars:
    # Число проходов при очистке освобождаемых блоков файловой системы
    passes: 1
    # Флаги аудита успехов и отказов
    events: "ocxuew:ocxuew"
    # Список создаваемых групп пользователей
    special_groups:
      - operators
      - nachsmens
      - technics
    # Группы в которые включаются вновь создаваемые пользователи
    initial_groups: "video,users,plugdev,floppy,dialout,cdrom,audio"
    # Пароль создаваемых пользователей
    default_passwd: "Aa123456"
    # Пароль администратора безопасности на настраиваемых хостах
    ansible_sudo_pass: "Aa123456"

  tasks:
  - name: Получение имени учетной записи администратора безопасности
    shell: id -n -u 1000
    register: admin_name

  - name: Генерация ssh-ключей администратора безопасности
    shell: |
      mkdir -p /home/{{ admin_name.stdout }}/.ssh
      ssh-keygen -f /home/{{ admin_name.stdout }}/.ssh/id_rsa -q -N "" <<< y
      chown -R {{ admin_name.stdout }}:{{ admin_name.stdout }} /home/{{ admin_name.stdout }}/.ssh
  #   args:
  #     warn: false

  - name: Включение гарантированного удаления файлов и папок
    shell: |
      astra-secdel-control enable
      sed -i 's/secdel[^ ]*/secdelrnd={{ passes }}/g' /etc/fstab
    when: passes > 0

  - name: Выключение гарантированного удаления файлов и папок
    shell:
      astra-secdel-control disable
    when: passes == 0

  - name: Настройка очистки разделов подкачки
    shell:
      astra-swapwiper-control enable

  - name: Настройка блокировки интерпретаторов кроме Bash для пользователей
    shell:
      astra-interpreters-lock enable

  - name: Настройка блокировки клавиш SysRq для всех пользователей, включая администраторов
    shell:
      astra-sysrq-lock enable
  
  - name: Настройка блокировки трассировки ptrace для всех пользователей, включая администраторов
    shell:
      astra-ptrace-lock enable      

  - name: Настройка блокировки системных команд для пользователей
    shell:
      astra-commands-lock enable

  - name: Настройка блокировки исполнения макросов libreoffice и VLC
    shell:
      astra-macros-lock enable

  - name: Настройка дополнительной аутентификации при повышении привилегий (ввода пароля для sudo)
    shell:
      astra-sudo-control enable

  - name: Настройка запрета вывода меню загрузчика
    shell:
      astra-nobootmenu-control enable

  - name: Настройка политики блокировки учетных записей
    shell:
      sed -i 's/pam_tally.so.*/pam_tally.so deny=6 unlock_time=1800/' /etc/pam.d/common-auth
  # args:
  #   warn: false

  - name: Настройка политики паролей
    shell: |
      # настройка сложности (длины и алфавита) паролей
      sed -i 's/pam_cracklib.so.*/pam_cracklib.so retry=3 difok=3 minlen=8 lcredit=-1 ucredit=-1 dcredit=-1 ocredit=0/' /etc/pam.d/common-password
      # настройка максимального количества дней между сменами пароля
      sed -i 's/^PASS_MAX_DAYS.*/PASS_MAX_DAYS 90/' /etc/login.defs
  # args:
  #   warn: false

  - name: Настройка правил протоколирования для пользователей
    shell:
      useraud -mo {{ events }}

  - name: Настройка разрешения удаленного запуска графических приложений
    shell: |
      sed -i 's/.*X11Forwarding.*/X11Forwarding yes/' /etc/ssh/sshd_config
      sed -i 's/.*X11UseLocalhost.*/X11UseLocalhost no/' /etc/ssh/sshd_config
  # args:
  #   warn: false

  - name: Создание групп пользователей
    group:
      name: "{{ item }}"
      state: present
    loop: "{{ special_groups }}"

  - name: Извлечение новых файлов из архива
    unarchive:
      src: postinst.tar.gz
      dest: /  

  - name: Включение службы контроля целостности afick
    systemd:
      name: afick
      enabled: true
      masked: no
      daemon_reload: true

# Запрет установки бита исполнения не дает выполнять плейбуки, т.к. на удаленных хостах видимо создаются исполняемые скрипты
# Без запрета установки бита исполнениявключение блокировки интерпретаторов также не имеет смысла,
# поэтому как вариант решения, делать эту настройку самой последней
# - name: Настройка запрета установки бита исполнения для всех пользователей, включая администраторов
#   shell:
#     astra-nochmodx-lock enable
  
